<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer decorative circle ring — pink/cyan gradient stroke -->
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Circle outline -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#ringGrad)" stroke-width="2.2"/>

  <!-- M letter (pink/mauve) -->
  <text
    x="52"
    y="130"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-style="italic"
    font-weight="700"
    fill="url(#mGrad)"
    letter-spacing="-8"
  >M</text>

  <!-- S letter (cyan) -->
  <text
    x="95"
    y="130"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-style="italic"
    font-weight="700"
    fill="url(#sGrad)"
    letter-spacing="-8"
  >S</text>
</svg>